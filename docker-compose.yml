services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lanchonete-app
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lanchonete
      DB_USERNAME: lanchonete
      DB_PASSWORD: lanchonete
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: lanchonete-db
    environment:
      MYSQL_DATABASE: lanchonete
      MYSQL_USER: lanchonete
      MYSQL_PASSWORD: lanchonete
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
